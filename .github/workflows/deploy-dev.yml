name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. fc28d7d or latest)"
        required: true
        type: string
      confirm_deploy:
        description: "Type deploy-prod to confirm"
        required: true
        type: string

env:
  ACR_NAME: netflixappprodacr
  ACR_LOGIN_SERVER: netflixappprodacr.azurecr.io
  AKS_CLUSTER_NAME: netflix-app-prod-aks
  AKS_RESOURCE_GROUP: netflix-app-prod-rg-we
  NAMESPACE: netflix-prod

permissions:
  id-token: write
  contents: read

jobs:

  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm_deploy }}" != "deploy-prod" ]; then
            echo "❌ You must type deploy-prod"
            exit 1
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group $AKS_RESOURCE_GROUP \
            --name $AKS_CLUSTER_NAME \
            --overwrite-existing

      - name: Verify ACR tag exists (hard fail)
        run: |
          TAG=${{ github.event.inputs.image_tag }}

          echo "Checking if tag exists: $TAG"

          az acr repository show-tags \
            --name $ACR_NAME \
            --repository netflix-api \
            --query "[?@=='$TAG']" -o tsv | grep $TAG

          az acr repository show-tags \
            --name $ACR_NAME \
            --repository netflix-app \
            --query "[?@=='$TAG']" -o tsv | grep $TAG

      - name: Deploy Kubernetes manifests
        run: |
          TAG=${{ github.event.inputs.image_tag }}

          echo "🚀 Deploying tag: $TAG"

          # Replace placeholders in ALL manifests
          sed -e "s|__ACR_LOGIN_SERVER__|$ACR_LOGIN_SERVER|g" \
              -e "s|__IMAGE_TAG__|$TAG|g" \
              k8s/prod/deployment.yml | kubectl apply -f -

          kubectl apply -f k8s/prod/service.yml
          kubectl apply -f k8s/prod/ingress.yml
          kubectl apply -f k8s/prod/hpa.yml
          kubectl apply -f k8s/prod/pdb.yml

      - name: Rollout status
        run: |
          kubectl rollout status deployment/netflix-web-green -n $NAMESPACE --timeout=600s
          kubectl rollout status deployment/netflix-api-green -n $NAMESPACE --timeout=600s

      - name: Verify
        run: |
          kubectl get pods -n $NAMESPACE
          kubectl get svc -n $NAMESPACE