name: CI - Build & Deploy Dev

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: netflixappdevacr.azurecr.io
  ACR_NAME: netflixappdevacr
  AKS_CLUSTER_NAME: netflix-app-dev-aks
  AKS_RESOURCE_GROUP: netflix-app-dev-rg
  NAMESPACE: netflix-dev
  FRONTEND_IMAGE: netflix-app
  API_IMAGE: netflix-api

permissions:
  id-token: write
  contents: read

jobs:

  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate tag
        id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name $ACR_NAME

      - name: Build & Push API
        run: |
          docker build -t $ACR_LOGIN_SERVER/$API_IMAGE:${{ steps.meta.outputs.tag }} -t $ACR_LOGIN_SERVER/$API_IMAGE:latest ./app
          docker push $ACR_LOGIN_SERVER/$API_IMAGE:${{ steps.meta.outputs.tag }}
          docker push $ACR_LOGIN_SERVER/$API_IMAGE:latest

      - name: Build & Push Web
        run: |
          docker build -t $ACR_LOGIN_SERVER/$FRONTEND_IMAGE:${{ steps.meta.outputs.tag }} -t $ACR_LOGIN_SERVER/$FRONTEND_IMAGE:latest ./app
          docker push $ACR_LOGIN_SERVER/$FRONTEND_IMAGE:${{ steps.meta.outputs.tag }}
          docker push $ACR_LOGIN_SERVER/$FRONTEND_IMAGE:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group $AKS_RESOURCE_GROUP \
            --name $AKS_CLUSTER_NAME \
            --overwrite-existing

      - name: Deploy
        run: |
          TAG=${{ needs.build-and-push.outputs.image_tag }}

          sed -e "s|__ACR_LOGIN_SERVER__|$ACR_LOGIN_SERVER|g" \
              -e "s|__IMAGE_TAG__|$TAG|g" \
              k8s/dev/deployment.yml | kubectl apply -f -

          kubectl apply -f k8s/dev/service.yml
          kubectl apply -f k8s/dev/ingress.yml

      - name: Verify
        run: |
          kubectl get pods -n $NAMESPACE
          kubectl get svc -n $NAMESPACE