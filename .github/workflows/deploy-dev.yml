name: Deploy to Dev

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_NAME: netflixappprodacr
  ACR_LOGIN_SERVER: netflixappprodacr.azurecr.io
  AKS_CLUSTER_NAME: netflix-app-prod-aks
  AKS_RESOURCE_GROUP: netflix-app-prod-rg-we
  NAMESPACE: netflix-dev
  FRONTEND_IMAGE: netflix-app
  API_IMAGE: netflix-api

permissions:
  id-token: write
  contents: read

jobs:

# ----------------------------
# 1. CODE SCAN
# ----------------------------
  sonarcloud-analysis:
    name: SonarCloud Code Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          projectBaseDir: ./app
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ----------------------------
# 2. BUILD & PUSH
# ----------------------------
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: sonarcloud-analysis

    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: echo "image_tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      # ----------------------------
      # FIXED PATHS (IMPORTANT)
      # ----------------------------
      - name: Build & Push Frontend
        working-directory: .
        run: |
          docker build -t $ACR_LOGIN_SERVER/$FRONTEND_IMAGE:${{ steps.tag.outputs.image_tag }} ./app/web
          docker push $ACR_LOGIN_SERVER/$FRONTEND_IMAGE:${{ steps.tag.outputs.image_tag }}

      - name: Build & Push API
        working-directory: .
        run: |
          docker build -t $ACR_LOGIN_SERVER/$API_IMAGE:${{ steps.tag.outputs.image_tag }} ./app/api
          docker push $ACR_LOGIN_SERVER/$API_IMAGE:${{ steps.tag.outputs.image_tag }}

# ----------------------------
# 3. DEPLOY
# ----------------------------
  deploy-dev:
    name: Deploy to Dev AKS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group $AKS_RESOURCE_GROUP \
            --name $AKS_CLUSTER_NAME \
            --overwrite-existing

      - name: Create Namespace (FIXED)
        run: |
          kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to Kubernetes
        run: |
          IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}

          sed -e "s|__ACR_LOGIN_SERVER__|$ACR_LOGIN_SERVER|g" \
              -e "s|__IMAGE_TAG__|$IMAGE_TAG|g" \
              k8s/dev/deployment.yml | kubectl apply -f -

          kubectl apply -f k8s/dev/service.yml
          kubectl apply -f k8s/dev/ingress.yml
          kubectl apply -f k8s/dev/hpa.yml

      - name: Verify Deployment
        run: |
          kubectl get pods -n $NAMESPACE
          kubectl get svc -n $NAMESPACE