name: CI - Build, Test & Security Scan

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

env:
  NODE_VERSION: "18"

jobs:

# -------------------------------------------------------
# Job 1: Build Frontend
# -------------------------------------------------------
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check (TypeScript)
        run: npx tsc --noEmit

      - name: Build application (Vite)
        env:
          VITE_APP_TMDB_V3_API_KEY: ${{ secrets.TMDB_API_KEY }}
          VITE_APP_API_ENDPOINT_URL: https://api.themoviedb.org/3
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: app/dist/

# -------------------------------------------------------
# Job 2: SonarCloud Analysis
# -------------------------------------------------------
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          projectBaseDir: app
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# -------------------------------------------------------
# Job 3: Trivy Filesystem Scan
# -------------------------------------------------------
  trivy-fs-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy FS scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH

      - name: Upload results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif

# -------------------------------------------------------
# Job 4: Docker Image Scan
# -------------------------------------------------------
  trivy-image-scan:
    name: Trivy Docker Image Scan
    runs-on: ubuntu-latest
    needs: build-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: app
        run: |
          docker build -f Dockerfile.frontend \
            --build-arg VITE_APP_TMDB_V3_API_KEY=scan-placeholder \
            -t netflix-app:scan .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: netflix-app:scan
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH

      - name: Upload results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif

# -------------------------------------------------------
# Job 5: Checkov IaC Scan
# -------------------------------------------------------
  checkov-scan:
    name: Checkov IaC Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Checkov
        run: pip install checkov

      - name: Terraform Scan
        run: |
          checkov -d Modules --framework terraform \
            --soft-fail || true

      - name: Kubernetes Scan
        run: |
          checkov -d k8s --framework kubernetes \
            --soft-fail || true