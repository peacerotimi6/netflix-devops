name: CD - Blue/Green Deploy to Production

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action"
        required: true
        type: choice
        options:
          - deploy-and-switch
          - switch-only
          - rollback
      confirm:
        description: "Type 'confirm' to proceed"
        required: true
        type: string

env:
  ACR_LOGIN_SERVER: netflixappprodacr.azurecr.io
  AKS_CLUSTER_NAME: netflix-app-prod-aks
  AKS_RESOURCE_GROUP: netflix-app-prod-rg-we
  NAMESPACE: netflix-prod

permissions:
  id-token: write
  contents: read

jobs:

  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm safety
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "confirm" ]; then
            echo "You must type confirm"
            exit 1
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # Azure Login
      # -----------------------------
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # -----------------------------
      # Get AKS credentials
      # -----------------------------
      - name: AKS login
        run: |
          az aks get-credentials \
            --resource-group $AKS_RESOURCE_GROUP \
            --name $AKS_CLUSTER_NAME \
            --overwrite-existing

      # -----------------------------
      # Detect inactive slot
      # -----------------------------
      - name: Detect slot
        id: slots
        run: |
          ACTIVE=$(kubectl get service netflix-web-service -n $NAMESPACE -o jsonpath='{.spec.selector.slot}' || echo "blue")

          if [ "$ACTIVE" = "blue" ]; then
            INACTIVE="green"
          else
            INACTIVE="blue"
          fi

          echo "active=$ACTIVE" >> $GITHUB_OUTPUT
          echo "inactive=$INACTIVE" >> $GITHUB_OUTPUT

      # -----------------------------
      # Deploy inactive slot
      # -----------------------------
      - name: Deploy
        if: github.event.inputs.action == 'deploy-and-switch'
        run: |
          SLOT=${{ steps.slots.outputs.inactive }}
          IMAGE_TAG=${{ github.sha }}

          sed -e "s|__ACR__|$ACR_LOGIN_SERVER|g" \
              -e "s|__TAG__|$IMAGE_TAG|g" \
              k8s/prod/blue-green/deployment-${SLOT}.yml | kubectl apply -f -

      # -----------------------------
      # Wait rollout
      # -----------------------------
      - name: Wait rollout
        if: github.event.inputs.action == 'deploy-and-switch'
        run: |
          SLOT=${{ steps.slots.outputs.inactive }}

          kubectl rollout status deployment/netflix-web-${SLOT} -n $NAMESPACE --timeout=600s
          kubectl rollout status deployment/netflix-api-${SLOT} -n $NAMESPACE --timeout=600s

      # -----------------------------
      # Switch traffic
      # -----------------------------
      - name: Switch traffic
        if: github.event.inputs.action != 'rollback'
        run: |
          TARGET=${{ steps.slots.outputs.inactive }}

          kubectl patch service netflix-web-service -n $NAMESPACE \
            -p "{\"spec\":{\"selector\":{\"slot\":\"$TARGET\"}}}"

          kubectl patch service netflix-api-service -n $NAMESPACE \
            -p "{\"spec\":{\"selector\":{\"slot\":\"$TARGET\"}}}"

      # -----------------------------
      # Rollback
      # -----------------------------
      - name: Rollback
        if: github.event.inputs.action == 'rollback'
        run: |
          TARGET=${{ steps.slots.outputs.active }}

          kubectl patch service netflix-web-service -n $NAMESPACE \
            -p "{\"spec\":{\"selector\":{\"slot\":\"$TARGET\"}}}"

          kubectl patch service netflix-api-service -n $NAMESPACE \
            -p "{\"spec\":{\"selector\":{\"slot\":\"$TARGET\"}}}"

      # -----------------------------
      # Verify
      # -----------------------------
      - name: Verify
        run: |
          kubectl get pods -n $NAMESPACE
          kubectl get svc -n $NAMESPACE