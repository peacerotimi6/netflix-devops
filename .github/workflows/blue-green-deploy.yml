name: Blue/Green Deploy to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (short SHA)"
        required: true
        type: string
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - deploy-and-switch
          - switch-only
          - rollback
      confirm:
        description: "Type 'confirm' to proceed with production change"
        required: true
        type: string

env:
  ACR_LOGIN_SERVER: netflixappprodacr.azurecr.io
  AKS_CLUSTER_NAME: netflix-app-prod-aks
  AKS_RESOURCE_GROUP: netflix-app-prod-rg-we
  NAMESPACE: netflix-prod

permissions:
  id-token: write
  contents: read

jobs:

  validate:
    name: Validate Request
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "confirm" ]; then
            echo "::error::You must type 'confirm' to proceed."
            exit 1
          fi

  blue-green:
    name: Blue/Green (${{ github.event.inputs.action }})
    runs-on: ubuntu-latest
    needs: validate
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------
      # Azure Login (OIDC)
      # -----------------------------
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # -----------------------------
      # AKS credentials (FIXED PART)
      # -----------------------------
      - name: Get AKS credentials
        run: |
          echo "Using RG: $AKS_RESOURCE_GROUP"
          echo "Using Cluster: $AKS_CLUSTER_NAME"

          az aks get-credentials \
            --resource-group "$AKS_RESOURCE_GROUP" \
            --name "$AKS_CLUSTER_NAME" \
            --overwrite-existing

      # -----------------------------
      # Detect active slot
      # -----------------------------
      - name: Detect active slot
        id: slots
        run: |
          ACTIVE=$(kubectl get service netflix-web-service \
            -n $NAMESPACE \
            -o jsonpath='{.spec.selector.slot}' 2>/dev/null || echo "blue")

          if [ "$ACTIVE" = "blue" ]; then
            INACTIVE="green"
          else
            INACTIVE="blue"
          fi

          echo "active=$ACTIVE" >> $GITHUB_OUTPUT
          echo "inactive=$INACTIVE" >> $GITHUB_OUTPUT

          echo "Active slot: $ACTIVE"
          echo "Inactive slot: $INACTIVE"

      # -----------------------------
      # Deploy to inactive slot
      # -----------------------------
      - name: Deploy to inactive slot
        if: github.event.inputs.action == 'deploy-and-switch'
        run: |
          IMAGE_TAG=${{ github.event.inputs.image_tag }}
          SLOT=${{ steps.slots.outputs.inactive }}

          sed -e "s|__ACR_LOGIN_SERVER__|$ACR_LOGIN_SERVER|g" \
              -e "s|__IMAGE_TAG__|$IMAGE_TAG|g" \
              k8s/prod/blue-green/deployment-${SLOT}.yml | kubectl apply -f -

      # -----------------------------
      # Wait for rollout
      # -----------------------------
      - name: Wait for rollout
        if: github.event.inputs.action == 'deploy-and-switch'
        run: |
          SLOT=${{ steps.slots.outputs.inactive }}

          kubectl rollout status deployment/netflix-web-${SLOT} -n $NAMESPACE --timeout=600s
          kubectl rollout status deployment/netflix-api-${SLOT} -n $NAMESPACE --timeout=600s

      # -----------------------------
      # Switch traffic
      # -----------------------------
      - name: Switch traffic
        if: github.event.inputs.action == 'deploy-and-switch' || github.event.inputs.action == 'switch-only'
        run: |
          TARGET=${{ steps.slots.outputs.inactive }}

          kubectl patch service netflix-web-service -n $NAMESPACE \
            -p "{\"spec\":{\"selector\":{\"app\":\"netflix-web\",\"slot\":\"$TARGET\"}}}"

          kubectl patch service netflix-api-service -n $NAMESPACE \
            -p "{\"spec\":{\"selector\":{\"app\":\"netflix-api\",\"slot\":\"$TARGET\"}}}"

      # -----------------------------
      # Rollback
      # -----------------------------
      - name: Rollback
        if: github.event.inputs.action == 'rollback'
        run: |
          TARGET=${{ steps.slots.outputs.active }}

          kubectl patch service netflix-web-service -n $NAMESPACE \
            -p "{\"spec\":{\"selector\":{\"app\":\"netflix-web\",\"slot\":\"$TARGET\"}}}"

          kubectl patch service netflix-api-service -n $NAMESPACE \
            -p "{\"spec\":{\"selector\":{\"app\":\"netflix-api\",\"slot\":\"$TARGET\"}}}"

      # -----------------------------
      # Verify
      # -----------------------------
      - name: Verify
        run: |
          kubectl get svc -n $NAMESPACE
          kubectl get pods -n $NAMESPACE -o wide