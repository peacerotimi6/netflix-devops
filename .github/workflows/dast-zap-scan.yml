name: OWASP ZAP - DAST Security Scan

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Target URL to scan (e.g., https://dev.adedayo.shop)"
        required: true
        type: string
      scan_type:
        description: "Type of ZAP scan"
        required: true
        type: choice
        options:
          - baseline
          - full
  # Run after successful dev deployment (baseline only)
  workflow_run:
    workflows: ["Deploy to Dev", "Deploy to Production"]
    types: [completed]

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  # -------------------------------------------------------
  # Job 1: Resolve target URL and environment
  # -------------------------------------------------------
  resolve-target:
    name: Resolve Scan Target
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    outputs:
      target_url: ${{ steps.resolve.outputs.url }}
      scan_type: ${{ steps.resolve.outputs.scan_type }}
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve target URL
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "url=${{ inputs.target_url }}" >> $GITHUB_OUTPUT
            echo "scan_type=${{ inputs.scan_type }}" >> $GITHUB_OUTPUT
          else
            # Determine environment from the triggering workflow name
            WORKFLOW_NAME="${{ github.event.workflow_run.name }}"
            if [ "$WORKFLOW_NAME" = "Deploy to Dev" ]; then
              CLUSTER="netflix-app-dev-aks"
              RG="netflix-app-dev-rg"
              NAMESPACE="netflix-dev"
            else
              CLUSTER="netflix-app-prod-aks"
              RG="netflix-app-prod-rg"
              NAMESPACE="netflix-prod"
            fi

            az aks get-credentials \
              --resource-group "$RG" \
              --name "$CLUSTER" \
              --overwrite-existing

            # Use the ingress hostname so nginx host-based routing works correctly.
            # Scanning by raw IP bypasses the Host header and returns 404 for all paths.
            HOSTNAME=$(kubectl get ingress netflix-ingress -n "$NAMESPACE" \
              -o jsonpath='{.spec.rules[0].host}' 2>/dev/null)

            if [ -z "$HOSTNAME" ]; then
              echo "::warning::No Ingress hostname found for $NAMESPACE. Skipping DAST scan."
              echo "url=" >> $GITHUB_OUTPUT
            else
              echo "url=https://${HOSTNAME}" >> $GITHUB_OUTPUT
            fi
            echo "scan_type=baseline" >> $GITHUB_OUTPUT
          fi

  # -------------------------------------------------------
  # Job 2: OWASP ZAP Baseline Scan
  # -------------------------------------------------------
  zap-baseline:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest
    needs: resolve-target
    if: needs.resolve-target.outputs.target_url != '' && needs.resolve-target.outputs.scan_type == 'baseline'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        continue-on-error: true
        with:
          target: ${{ needs.resolve-target.outputs.target_url }}
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a -j"
          allow_issue_writing: true
          fail_action: false

  # -------------------------------------------------------
  # Job 3: OWASP ZAP Full Scan (manual only)
  # -------------------------------------------------------
  zap-full:
    name: ZAP Full Scan
    runs-on: ubuntu-latest
    needs: resolve-target
    if: needs.resolve-target.outputs.target_url != '' && needs.resolve-target.outputs.scan_type == 'full'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.10.0
        continue-on-error: true
        with:
          target: ${{ needs.resolve-target.outputs.target_url }}
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a -j"
          allow_issue_writing: true
          fail_action: false

  # -------------------------------------------------------
  # Job 4: ZAP API Scan
  # -------------------------------------------------------
  zap-api:
    name: ZAP API Scan
    runs-on: ubuntu-latest
    needs: resolve-target
    if: needs.resolve-target.outputs.target_url != ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: OWASP ZAP API Scan
        uses: zaproxy/action-api-scan@v0.7.0
        continue-on-error: true
        with:
          target: "${{ needs.resolve-target.outputs.target_url }}/api/openapi.json"
          format: openapi
          cmd_options: "-a -j"
          allow_issue_writing: true
          fail_action: false
