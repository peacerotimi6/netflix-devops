name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (must exist in ACR e.g. fc28d7d or latest)"
        required: true
        type: string
      confirm_deploy:
        description: "Type deploy-prod to confirm"
        required: true
        type: string

env:
  ACR_LOGIN_SERVER: netflixappprodacr.azurecr.io
  AKS_CLUSTER_NAME: netflix-app-prod-aks
  AKS_RESOURCE_GROUP: netflix-app-prod-rg-we
  NAMESPACE: netflix-prod
  FRONTEND_IMAGE: netflix-app
  API_IMAGE: netflix-api

permissions:
  id-token: write
  contents: read

jobs:

  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate input
        run: |
          if [ "${{ github.event.inputs.confirm_deploy }}" != "deploy-prod" ]; then
            echo "❌ Type deploy-prod to proceed"
            exit 1
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group $AKS_RESOURCE_GROUP \
            --name $AKS_CLUSTER_NAME \
            --overwrite-existing

      - name: Deploy Kubernetes manifests
        run: |
          IMAGE_TAG=${{ inputs.image_tag }}

          echo "🚀 Deploying tag: $IMAGE_TAG"

          sed -e "s|__ACR_LOGIN_SERVER__|$ACR_LOGIN_SERVER|g" \
              -e "s|__IMAGE_TAG__|$IMAGE_TAG|g" \
              k8s/prod/deployment.yml | kubectl apply -f -

          kubectl apply -f k8s/prod/service.yml
          kubectl apply -f k8s/prod/ingress.yml
          kubectl apply -f k8s/prod/hpa.yml
          kubectl apply -f k8s/prod/pdb.yml

      - name: Rollout status (GREEN deployments)
        run: |
          kubectl rollout status deployment/netflix-web-green -n $NAMESPACE --timeout=600s
          kubectl rollout status deployment/netflix-api-green -n $NAMESPACE --timeout=600s

      - name: Verify
        run: |
          kubectl get pods -n $NAMESPACE
          kubectl get svc -n $NAMESPACE