name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (must exist in prod ACR e.g. a1b2c3d)"
        required: true
        type: string
      confirm_deploy:
        description: "Type 'deploy-prod' to confirm production deployment"
        required: true
        type: string

env:
  ACR_NAME: netflixappprodacr
  ACR_LOGIN_SERVER: netflixappprodacr.azurecr.io
  AKS_CLUSTER_NAME: netflix-app-prod-aks
  AKS_RESOURCE_GROUP: netflix-app-prod-rg-we
  NAMESPACE: netflix-prod
  FRONTEND_IMAGE: netflix-app
  API_IMAGE: netflix-api

permissions:
  id-token: write
  contents: read

jobs:

# -------------------------------------------------------
# 1. VALIDATE INPUT
# -------------------------------------------------------
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm_deploy }}" != "deploy-prod" ]; then
            echo "❌ ERROR: You must type deploy-prod"
            exit 1
          fi

# -------------------------------------------------------
# 2. DEPLOY
# -------------------------------------------------------
  deploy-prod:
    runs-on: ubuntu-latest
    needs: validate
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------- AZURE LOGIN ----------------
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ---------------- AKS LOGIN ----------------
      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.AKS_RESOURCE_GROUP }} \
            --name ${{ env.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      # ---------------- ENSURE NAMESPACE ----------------
      - name: Create namespace
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      # ---------------- CREATE SECRET (FIXED) ----------------
      - name: Create Kubernetes Secret
        run: |
          kubectl create secret generic netflix-app-secrets \
            -n ${{ env.NAMESPACE }} \
            --from-literal=TMDB_API_KEY=${{ secrets.TMDB_API_KEY }} \
            --dry-run=client -o yaml | kubectl apply -f -

      # ---------------- DEPLOY FRONTEND ----------------
      - name: Deploy Web App
        run: |
          IMAGE_TAG=${{ inputs.image_tag }}

          echo "Deploying frontend: $IMAGE_TAG"

          sed -e "s|__ACR_LOGIN_SERVER__|${{ env.ACR_LOGIN_SERVER }}|g" \
              -e "s|__IMAGE_TAG__|$IMAGE_TAG|g" \
              k8s/prod/web-deployment.yml | kubectl apply -f -

      # ---------------- DEPLOY API ----------------
      - name: Deploy API
        run: |
          IMAGE_TAG=${{ inputs.image_tag }}

          echo "Deploying API: $IMAGE_TAG"

          sed -e "s|__ACR_LOGIN_SERVER__|${{ env.ACR_LOGIN_SERVER }}|g" \
              -e "s|__IMAGE_TAG__|$IMAGE_TAG|g" \
              k8s/prod/api-deployment.yml | kubectl apply -f -

      # ---------------- APPLY SERVICES ----------------
      - name: Apply Service & Ingress
        run: |
          kubectl apply -f k8s/prod/service.yml -n ${{ env.NAMESPACE }}
          kubectl apply -f k8s/prod/ingress.yml -n ${{ env.NAMESPACE }}

      # ---------------- ROLLOUT CHECK (FIXED NAMES) ----------------
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/netflix-web-green -n ${{ env.NAMESPACE }} --timeout=600s
          kubectl rollout status deployment/netflix-api-green -n ${{ env.NAMESPACE }} --timeout=600s

      # ---------------- VERIFY ----------------
      - name: Verify deployment
        run: |
          echo "=== PODS ==="
          kubectl get pods -n ${{ env.NAMESPACE }}

          echo "=== SERVICES ==="
          kubectl get svc -n ${{ env.NAMESPACE }}

          echo "=== INGRESS ==="
          kubectl get ingress -n ${{ env.NAMESPACE }}