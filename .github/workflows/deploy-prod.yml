name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (must exist in prod ACR e.g. a1b2c3d)"
        required: true
        type: string
      confirm_deploy:
        description: "Type 'deploy-prod' to confirm production deployment"
        required: true
        type: string

env:
  ACR_NAME: netflixappprodacr
  ACR_LOGIN_SERVER: netflixappprodacr.azurecr.io
  AKS_CLUSTER_NAME: netflix-app-prod-aks
  AKS_RESOURCE_GROUP: netflix-app-prod-rg-we
  NAMESPACE: netflix-prod
  FRONTEND_IMAGE: netflix-app
  API_IMAGE: netflix-api

permissions:
  id-token: write
  contents: read

jobs:

  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm_deploy }}" != "deploy-prod" ]; then
            echo "ERROR: Type deploy-prod to proceed"
            exit 1
          fi

  deploy-prod:
    runs-on: ubuntu-latest
    needs: validate
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group $AKS_RESOURCE_GROUP \
            --name $AKS_CLUSTER_NAME \
            --overwrite-existing

      - name: Deploy manifests
        run: |
          IMAGE_TAG=${{ inputs.image_tag }}

          echo "Deploying image tag: $IMAGE_TAG"

          sed -e "s|__ACR_LOGIN_SERVER__|$ACR_LOGIN_SERVER|g" \
              -e "s|__IMAGE_TAG__|$IMAGE_TAG|g" \
              k8s/prod/deployment.yml | kubectl apply -f -

          kubectl apply -f k8s/prod/service.yml
          kubectl apply -f k8s/prod/ingress.yml

      - name: Rollout status
        run: |
          kubectl rollout status deployment/netflix-web -n $NAMESPACE
          kubectl rollout status deployment/netflix-api -n $NAMESPACE

      - name: Verify
        run: |
          kubectl get pods -n $NAMESPACE
          kubectl get svc -n $NAMESPACE
