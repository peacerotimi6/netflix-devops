apiVersion: apps/v1
kind: Deployment
metadata:
  name: netflix-web
  namespace: netflix-prod
  labels:
    app: netflix-web
    environment: prod

spec:
  replicas: 3
  progressDeadlineSeconds: 900

  selector:
    matchLabels:
      app: netflix-web
      slot: green   # important for blue/green stability

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: netflix-web
        environment: prod
        slot: green

    spec:
      automountServiceAccountToken: false

      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: netflix-web
          image: __ACR_LOGIN_SERVER__/netflix-app:__IMAGE_TAG__
          imagePullPolicy: Always

          ports:
            - containerPort: 8080

          envFrom:
            - configMapRef:
                name: netflix-app-config

          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop:
                - ALL

          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20

          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netflix-api
  namespace: netflix-prod
  labels:
    app: netflix-api
    environment: prod

spec:
  replicas: 2
  progressDeadlineSeconds: 900

  selector:
    matchLabels:
      app: netflix-api
      slot: green

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: netflix-api
        environment: prod
        slot: green

    spec:
      automountServiceAccountToken: false

      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: netflix-api
          image: __ACR_LOGIN_SERVER__/netflix-api:__IMAGE_TAG__
          imagePullPolicy: Always

          ports:
            - containerPort: 8080

          envFrom:
            - secretRef:
                name: netflix-app-secrets

          env:
            - name: HF_HOME
              value: /tmp/huggingface
            - name: TRANSFORMERS_CACHE
              value: /tmp/huggingface

          volumeMounts:
            - name: tmp-storage
              mountPath: /tmp

          resources:
            requests:
              cpu: "300m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"

      volumes:
        - name: tmp-storage
          emptyDir: {}